name: Bug report
description: File a reproducible defect against this Vianium component.
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more reproducible
        the report, the faster the fix.

        For security-sensitive issues, **do not file here** — follow
        [SECURITY.md](../SECURITY.md) instead.

  - type: input
    id: component
    attributes:
      label: Component version
      description: Tag, branch, or commit hash you observed the bug against.
      placeholder: "e.g. v0.1.0 or commit abc1234"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform / device
      description: Where did this reproduce?
      options:
        - Windows Phone 8.1
        - Windows 10 Mobile
        - Other Windows
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the actual behaviour you observed.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe the behaviour you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Numbered list of exact steps that reproduce the issue.
      placeholder: |
        1. Build component X in Debug|ARM
        2. Run smoke test Y
        3. Observe error Z
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / diagnostics
      description: Paste any relevant log lines (redact sensitive data first).
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and discussions before opening this one.
          required: true
        - label: This is NOT a security-sensitive report (those go to SECURITY.md).
          required: true
